<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
  <title>Matrix Rain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 240px;
      height: 282px;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 240px;
      height: 282px;
    }

    #hud {
      position: absolute;
      bottom: 6px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #hud.visible { opacity: 1; }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }

    .dot.active { opacity: 1; transform: scale(1.4); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <script src="rain.js"></script>
</body>
</html>
