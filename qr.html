<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain — Install QR</title>
  <style>
    body {
      background: #000;
      color: #00ff41;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 { font-size: 18px; margin-bottom: 4px; letter-spacing: 2px; }
    p  { font-size: 12px; opacity: 0.6; margin-bottom: 24px; }
    #qr canvas, #qr img { border: 4px solid #00ff41; border-radius: 4px; }
    .hint { margin-top: 20px; font-size: 11px; opacity: 0.5; text-align: center; max-width: 280px; }
  </style>
</head>
<body>
  <h1>MATRIX RAIN</h1>
  <p>Scan with your Rabbit R1</p>
  <div id="qr"></div>
  <div class="hint">Open Creations on your R1 → tap + → Scan QR</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    const payload = JSON.stringify({
      title: "Matrix Rain",
      url: "https://bitm4ps.github.io/matrix-rain/",
      description: "Matrix digital rain screensaver. Scroll = speed, PTT = color theme.",
      iconUrl: "",
      themeColor: "#00ff41"
    });

    QRCode.toCanvas(payload, {
      width: 280,
      margin: 2,
      color: { dark: '#00ff41', light: '#000000' }
    }, (err, canvas) => {
      if (err) { document.getElementById('qr').textContent = err.message; return; }
      document.getElementById('qr').appendChild(canvas);
    });
  </script>
</body>
</html>
